<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{{ title }}</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #fdfdfd;
            margin: 60px;
            color: #333;
        }
        h1 {
            font-size: 2.4em;
            margin-bottom: 0.5em;
            border-bottom: 3px solid #006598;
            padding-bottom: 10px;
        }
        h2 {
            margin-top: 2.5em;
            color: #006598;
            font-size: 1.8em;
        }
        .styled-table {
            border-collapse: collapse;
            margin-top: 1em;
            width: 100%;
            font-size: 1em;
            border: 1px solid #e3e3e3;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }
        .styled-table thead tr {
            background-color: #006598;
            color: #ffffff;
        }
        .styled-table th,
        .styled-table td {
            padding: 12px 16px;
            border: 1px solid #ddd;
        }
        .styled-table tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <h1>{{ title }}</h1>

    <h2>🧮 Economic & Social Impact</h2>
    {{ econ_table | safe }}

    <h2>⚖️ Balance Summary</h2>
    {{ balance_table | safe }}

    <h2>🍽️ Cost of Cooking</h2>
    {{ cooking_table | safe }}

</body>
</html>
